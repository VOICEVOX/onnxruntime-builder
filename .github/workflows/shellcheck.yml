name: ShellCheck

on:
  - push
  - pull_request

jobs:
  shellcheck:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Update ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -V

      - name: ShellCheck
        run: git ls-files | grep -E '\.(ba)?sh' | xargs shellcheck
